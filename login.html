<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login — KPI Tracker</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body class="login-page">

<div class="login-wrapper">
  <div class="login-brand">
    <div class="brand-icon">K</div>
    <h1>KPI Tracker</h1>
    <p>Employee Performance Management System</p>
  </div>

  <div class="login-card">
    <h2>Sign In</h2>
    <p class="login-sub">Use your admin credentials to continue</p>

    <div id="login-error" class="alert alert-danger" style="display:none"></div>

    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter username" autocomplete="off"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter password"/>
    </div>

    <button class="btn btn-primary btn-full" onclick="handleLogin()">Sign In</button>

    <p class="login-hint">Demo credentials: <strong>admin</strong> / <strong>admin123</strong></p>
  </div>
</div>

<script src="data.js"></script>
<script src="auth.js"></script>
</body>
</html>
