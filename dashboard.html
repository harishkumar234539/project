<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard — KPI Tracker</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="app-layout">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">K</div>
      <span>KPI Tracker</span>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item active"><span class="nav-icon">&#9732;</span> Dashboard</a>
      <a href="employees.html" class="nav-item"><span class="nav-icon">&#9786;</span> Employees</a>
      <a href="kpi.html" class="nav-item"><span class="nav-icon">&#9650;</span> KPI Records</a>
      <a href="attendance.html" class="nav-item"><span class="nav-icon">&#9632;</span> Attendance</a>
      <a href="reports.html" class="nav-item"><span class="nav-icon">&#9635;</span> Reports</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="avatar av-blue" style="width:32px;height:32px;font-size:12px">AD</div>
        <div>
          <div style="font-size:13px;font-weight:500">Admin</div>
          <div style="font-size:11px;color:#94a3b8">HR Manager</div>
        </div>
      </div>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main-content">
    <div class="topbar">
      <div>
        <h2 class="page-title">Dashboard</h2>
        <p class="page-sub">Q1 2026 — Performance Overview</p>
      </div>
      <div class="topbar-right">
        <span class="badge badge-success">Live</span>
        <span class="topbar-date" id="today-date"></span>
      </div>
    </div>

    <!-- METRIC CARDS -->
    <div class="metric-grid" id="metric-grid"></div>

    <!-- TWO COLUMN -->
    <div class="grid2">
      <div class="card">
        <div class="card-header">
          <span class="card-title">Top Performers</span>
          <a href="employees.html" class="card-link">View all</a>
        </div>
        <div id="top-performers"></div>
      </div>
      <div class="card">
        <div class="card-header">
          <span class="card-title">KRI Risk Indicators</span>
        </div>
        <div id="kri-list"></div>
      </div>
    </div>

    <!-- CHARTS ROW -->
    <div class="grid2">
      <div class="card">
        <div class="card-header"><span class="card-title">Department KPI</span></div>
        <div style="position:relative;height:220px">
          <canvas id="deptChart"></canvas>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title">Attendance Trend</span></div>
        <div style="position:relative;height:220px">
          <canvas id="attendChart"></canvas>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="data.js"></script>
<script src="auth.js"></script>
<script src="dashboard.js"></script>
</body>
</html>
